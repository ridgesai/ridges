name: Pylint

on: [push]

jobs:
  build:
    name: pylint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
    - name: Checkout repository with submodules
      uses: actions/checkout@v4
      with:
        submodules: true
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint -e SWE-agent -e .
    - name: Analysing the code with pylint
      run: |
        # TODO: Improve how we keep track of these files
        pylint --errors-only ridges/validator ridges/helpers ridges/miner ridges/utils setup.py scripts neurons ridges/protocol.py ridges/repo_environment.py ridges/synthetic_testing.py
