# docker-compose.yml  –  shared-wallets edition
services:
  # 1) Build image once
  ridges-base:
    build:
      context: .
      target: runtime
    image: ridges-base:latest
    profiles: ["builder"]

  # 2) Runtime services
  subtensor:
    image: ridges-base:latest
    container_name: subtensor
    working_dir: /subtensor
    command: ["bash", "-c",
      "BUILD_BINARY=0 ./scripts/localnet.sh False --ws-external --enable-pow-faucet"]
    environment:
      - RUN_IN_DOCKER=1
    ports:
      - "9945:9945"
    networks: [ridgesnet]
    volumes:
      - subtensor-data:/subtensor/data        # chain state
      - bt-wallets:/root/.bittensor           # 🔑 share wallets (optional but handy)

  miner:
    image: ridges-base:latest
    container_name: miner
    depends_on: [subtensor]
    working_dir: /app
    command: ["bash", "-c",
      "/opt/venv/bin/python neurons/miner.py \
       --netuid 1 \
       --subtensor.network ws://subtensor:9945 \
       --wallet.name miner \
       --wallet.hotkey default"]
    networks: [ridgesnet]
    volumes:
      - bt-wallets:/root/.bittensor           # 🔑 shared keys

  validator:
    image: ridges-base:latest
    container_name: validator
    depends_on: [subtensor]
    working_dir: /app
    command: ["bash", "-c",
      "/opt/venv/bin/python neurons/validator.py \
       --netuid 1 \
       --subtensor.network ws://subtensor:9945 \
       --wallet.name validator \
       --wallet.hotkey default"]
    environment:
      - OPENAI_API_KEY=sk-replace-me
    networks: [ridgesnet]
    volumes:
      - bt-wallets:/root/.bittensor           # 🔑 shared keys

# Shared network & volumes
networks:
  ridgesnet:
    driver: bridge

volumes:
  subtensor-data:
  bt-wallets:
