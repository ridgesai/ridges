services:
  db:
    image: postgres:16-alpine
    container_name: ridges-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ridges
      POSTGRES_PASSWORD: ridges123
      POSTGRES_DB: ridges
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ridges -d ridges"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: ./Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - ./api/.env
    depends_on:
      db:
        condition: service_healthy
      s3:
        condition: service_started

  s3:
    image: adobe/s3mock:latest
    environment:
      - COM_ADOBE_TESTING_S3MOCK_STORE_INITIAL_BUCKETS=ridges-local,ridges-registry
      - COM_ADOBE_TESTING_S3MOCK_STORE_ROOT=/s3mockroot
      - COM_ADOBE_TESTING_S3MOCK_STORE_RETAINFILESONEXIT=true
    ports:
      - "9090:9090"
      - "9191:9191"
    volumes:
      - s3_data:/s3mockroot

volumes:
  postgres_data:
  s3_data:
