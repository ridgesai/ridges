            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: shared-env
              mountPath: /shared
      volumes:
        - name: shared-env
          emptyDir: {}
---
# Headless services for stable DNS (required by StatefulSet spec)
apiVersion: v1
kind: Service
metadata:
  name: ridges-screener-1
  namespace: ridges
spec:
  clusterIP: None
  selector:
    app: ridges-screener
    ridges.ai/screener-class: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: ridges-screener-2
  namespace: ridges
spec:
  clusterIP: None
  selector:
    app: ridges-screener
    ridges.ai/screener-class: "2"
---
# ServiceAccount + RBAC for the screener to manage Pods and Jobs in the ridges namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ridges-screener
  namespace: ridges
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ridges-screener
  namespace: ridges
rules:
  - apiGroups: [""]
    resources: [pods, secrets]
    verbs: [get, list, watch, create, delete, patch]
  - apiGroups: [""]
    resources: [pods/exec]
    verbs: [create, get]
  - apiGroups: [batch]
    resources: [jobs]
    verbs: [get, list, watch, create, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ridges-screener
  namespace: ridges
subjects:
  - kind: ServiceAccount
    name: ridges-screener
    namespace: ridges
roleRef:
  kind: Role
  name: ridges-screener
  apiGroup: rbac.authorization.k8s.io
