---
# TCP proxy — forwards specific ports to the Docker host machine.
#
# Pods in the ridges namespace can reach host services via:
#   http://dockerhost.ridges.svc:8000   → local Ridges API
#   http://dockerhost.ridges.svc:9090   → local S3mock (presigned URL host)
#
# Why hostNetwork: true?
#   Calico's pod network has no route to host.docker.internal (192.168.65.254).
#   Running with hostNetwork places the proxy in the Kind node's network namespace,
#   which can reach 192.168.65.254 directly.  No iptables DNAT is needed.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dockerhost
  namespace: ridges
  labels:
    app: dockerhost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dockerhost
  template:
    metadata:
      labels:
        app: dockerhost
    spec:
      hostNetwork: true
      # Run on a fixed node so the hostNetwork pod doesn't clash with other replicas.
      # For Kind there is only one 'ridges-worker' so this is a no-op but makes intent clear.
      tolerations:
        - operator: Exists
      containers:
        - name: dockerhost
          image: python:3.12-slim
          command:
            - python3
            - -c
            - |
              import socket, threading, time

              # Resolve host.docker.internal once at startup (runs in host netns, works).
              HOST = socket.gethostbyname('host.docker.internal')
              PORTS = [8000, 9090, 9191]
              print(f'Proxying ports {PORTS} -> {HOST}', flush=True)

              def forward(src, dst):
                  try:
                      while True:
                          d = src.recv(65536)
                          if not d:
                              break
                          dst.sendall(d)
                  except Exception:
                      pass

              def accept_loop(srv, port):
                  while True:
                      try:
                          client, _ = srv.accept()
                      except Exception:
                          return
                      def handle(c=client):
                          remote = None
                          try:
                              remote = socket.create_connection((HOST, port), timeout=10)
                              t = threading.Thread(target=forward, args=(c, remote), daemon=True)
                              t.start()
                              forward(remote, c)
                          except Exception as e:
                              print(f'port {port}: {e}', flush=True)
                          finally:
                              c.close()
                              if remote:
                                  remote.close()
                      threading.Thread(target=handle, daemon=True).start()

              for port in PORTS:
                  srv = socket.socket()
                  srv.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
                  srv.bind(('0.0.0.0', port))
                  srv.listen(128)
                  threading.Thread(target=accept_loop, args=(srv, port), daemon=True).start()
                  print(f'Listening on :{port}', flush=True)

              while True:
                  time.sleep(60)
          ports:
            - containerPort: 8000
            - containerPort: 9090
            - containerPort: 9191
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: dockerhost
  namespace: ridges
  labels:
    app: dockerhost
spec:
  selector:
    app: dockerhost
  # Named ports covering the services we want to expose from the host.
  # qoomon/docker-host forwards ALL ports by default, so any port below
  # is reachable as dockerhost.ridges.svc:<port>.
  ports:
    - name: api
      port: 8000
      targetPort: 8000
      protocol: TCP
    - name: s3
      port: 9090
      targetPort: 9090
      protocol: TCP
    - name: s3-ssl
      port: 9191
      targetPort: 9191
      protocol: TCP
---
# DNS alias so screener pods can resolve the 's3' hostname embedded in
# presigned URLs generated by the API (S3_ENDPOINT_URL=http://s3:9090).
# CoreDNS resolves 's3' → CNAME → dockerhost.ridges.svc.cluster.local → ClusterIP.
apiVersion: v1
kind: Service
metadata:
  name: s3
  namespace: ridges
spec:
  type: ExternalName
  externalName: dockerhost.ridges.svc.cluster.local
