---
# kind cluster config for local testing.
# Uses Calico as the CNI so NetworkPolicies are enforced.
#
# Usage:
#   kind create cluster --name ridges --config k8s/kind-config.yaml
#   kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.27.0/manifests/calico.yaml
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  # Disable kindnet so Calico can take over
  disableDefaultCNI: true
  podSubnet: "192.168.0.0/16"
nodes:
  - role: control-plane
  - role: worker
  - role: worker
