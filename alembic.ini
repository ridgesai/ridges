[alembic]
# Path to migration scripts, relative to this file.
script_location = %(here)s/alembic

# Prepend the project root to sys.path so env.py can import project modules.
prepend_sys_path = .

# Migration file naming: YYYY_MM_DD_<slug>.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(slug)s
truncate_slug_length = 40

path_separator = os

# Database URL is set dynamically in env.py from environment variables.
sqlalchemy.url =

# Minimal logging config required by fileConfig() in env.py.
# Handlers and formatters are intentionally empty — env.py attaches
# RidgesLogHandler directly to the alembic logger after fileConfig runs.
[loggers]
keys = root,alembic

[handlers]
keys =

[formatters]
keys =

[logger_root]
level = WARNING
handlers =

[logger_alembic]
level = INFO
handlers =
qualname = alembic
