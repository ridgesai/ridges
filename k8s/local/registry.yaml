---
# Zot OCI registry — S3-backed, stateless, inline GC with aggressive retention.
#
# Local (Kind): S3mock on dockerhost.ridges.svc:9090, 1 replica.
#
# Deploy:
#   kubectl apply -f k8s/registry.yaml
#   make k8s-registry   (also generates htpasswd + docker-config secrets)
#
# Credentials (auto-generated by make k8s-registry, not hardcoded here):
#   registry-htpasswd   — bcrypt htpasswd file for Zot auth
#   registry-creds      — docker-config secret for Kaniko push + kubelet pull
apiVersion: v1
kind: ConfigMap
metadata:
  name: registry-config
  namespace: ridges
data:
  config.json: |
    {
      "storage": {
        "rootDirectory": "/tmp/zot",
        "gc": true,
        "gcDelay": "15m",
        "gcInterval": "1h",
        "dedupe": false,
        "storageDriver": {
          "name": "s3",
          "rootdirectory": "/registry",
          "region": "us-east-1",
          "regionendpoint": "http://dockerhost.ridges.svc:9090",
          "bucket": "ridges-registry",
          "secure": false,
          "skipverify": true,
          "forcepathstyle": true
        }
      },
      "http": {
        "address": "0.0.0.0",
        "port": "5000",
        "compat": ["docker2s2"],
        "auth": {
          "htpasswd": {
            "path": "/etc/zot/htpasswd"
          }
        }
      },
      "log": {
        "level": "info"
      }
    }
---
# Zot Deployment — stateless (S3 is source of truth), 1 replica for local.
# In production, set replicas: 2+ and override ZOT_S3_ENDPOINT/credentials.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: ridges
  labels:
    app: registry
spec:
  replicas: 1  # local; set to 2+ in prod
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
        - name: zot
          image: ghcr.io/project-zot/zot-linux-amd64:v2.1.16
          args: ["serve", "/etc/zot/config.json"]
          ports:
            - containerPort: 5000
              name: registry
          env:
            # S3mock accepts any credentials; prod: use real IAM keys or workload identity.
            - name: AWS_ACCESS_KEY_ID
              value: "test"
            - name: AWS_SECRET_ACCESS_KEY
              value: "test"
          volumeMounts:
            - name: config
              mountPath: /etc/zot/config.json
              subPath: config.json
              readOnly: true
            - name: htpasswd
              mountPath: /etc/zot/htpasswd
              subPath: htpasswd
              readOnly: true
            # Zot temp metadata directory (required even with S3 backend).
            - name: tmp
              mountPath: /tmp/zot
          readinessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
      volumes:
        - name: config
          configMap:
            name: registry-config
        - name: htpasswd
          secret:
            secretName: registry-htpasswd
        - name: tmp
          emptyDir:
            sizeLimit: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: ridges
  labels:
    app: registry
spec:
  ports:
    - port: 5000
      targetPort: 5000
      name: registry
  selector:
    app: registry
